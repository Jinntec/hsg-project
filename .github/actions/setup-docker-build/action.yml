name: Setup Docker build environment
description: Maximize disk space, configure containerd and Docker for CI builds on GitHub runners
inputs:
  build-mount-path:
    description: Mount path for the build volume
    default: /var/lib/docker/
  root-reserve-mb:
    description: MB to reserve on root filesystem
    default: '2048'
  temp-reserve-mb:
    description: MB to reserve on temp filesystem
    default: '512'
  remove-dotnet:
    default: 'true'
  remove-android:
    default: 'true'
  remove-haskell:
    default: 'true'
  remove-codeql:
    default: 'true'
  remove-docker-images:
    default: 'true'
runs:
  using: composite
  steps:
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        build-mount-path: ${{ inputs.build-mount-path }}
        root-reserve-mb: ${{ inputs.root-reserve-mb }}
        temp-reserve-mb: ${{ inputs.temp-reserve-mb }}
        remove-dotnet: ${{ inputs.remove-dotnet }}
        remove-android: ${{ inputs.remove-android }}
        remove-haskell: ${{ inputs.remove-haskell }}
        remove-codeql: ${{ inputs.remove-codeql }}
        remove-docker-images: ${{ inputs.remove-docker-images }}

    - name: Configure containerd to use Docker volume
      shell: bash
      run: |
        sudo mkdir -p /etc/containerd /var/lib/docker/containerd
        if sudo containerd config default > /tmp/containerd.toml 2>/dev/null; then
          sudo sed -i 's|root = .*|root = "/var/lib/docker/containerd"|' /tmp/containerd.toml
          grep -q 'root = ' /tmp/containerd.toml || echo 'root = "/var/lib/docker/containerd"' | sudo tee -a /tmp/containerd.toml
        else
          printf 'version = 2\nroot = "/var/lib/docker/containerd"\n' | sudo tee /tmp/containerd.toml
        fi
        sudo mv /tmp/containerd.toml /etc/containerd/config.toml
        sudo systemctl restart containerd 2>/dev/null || true

    - name: Configure Docker log limits
      shell: bash
      run: |
        sudo mkdir -p /etc/docker
        if [ -s /etc/docker/daemon.json ]; then
          sudo python3 -c "
        import json
        with open('/etc/docker/daemon.json') as f: c=json.load(f)
        c.setdefault('log-opts',{})['max-size']='10m'
        c['log-opts']['max-file']='3'
        with open('/etc/docker/daemon.json','w') as f: json.dump(c,f,indent=2)
        "
        else
          echo '{"log-driver":"json-file","log-opts":{"max-size":"10m","max-file":"3"}}' | sudo tee /etc/docker/daemon.json
        fi

    - name: Restart docker
      shell: bash
      run: sudo service docker restart
