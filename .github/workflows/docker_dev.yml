name: Docker Dev containers for HSG
on: 
  push:
  pull_request:
  schedule: 
      - cron: "0 0/12 * * *"

env:
  TEST_TAG: joewiz/hsg-project:exist-ci

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref ==  'main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            cache_suffix: x86
            tag: joewiz/hsg-project:exist-ci
            load: true
            run_tests: true
          - platform: linux/arm64
            cache_suffix: arm
            tag: hsg-project:arm
            load: false
            run_tests: false

    steps:
    # SETUP
      - name: Setup Docker build environment
        uses: ./.github/actions/setup-docker-build

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Make buildkit default
        uses: docker/setup-buildx-action@v3
        id: buildx
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Install bats
        if: matrix.run_tests
        run: sudo apt-get install bats

      # BUILD
      - name: Build ${{ matrix.platform }} image
        timeout-minutes: 60
        if: matrix.platform == 'linux/amd64'
        env:
          BUILDKIT_PROGRESS: plain
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            TEMPLATING_VERSION=1.1.0
            TEI_PUBLISHER_LIB_VERSION=2.10.1
            EXPATH_CRYPTO_VERSION=6.0.1
          load: true
          tags: ${{ matrix.tag }}
          cache-from: type=registry,ref=joewiz/hsg-project:buildcache-${{ matrix.cache_suffix }}
          cache-to: type=registry,ref=joewiz/hsg-project:buildcache-${{ matrix.cache_suffix }},mode=max

      - name: Build ${{ matrix.platform }} image
        timeout-minutes: 240
        if: matrix.platform == 'linux/arm64'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            TEMPLATING_VERSION=1.1.0
            TEI_PUBLISHER_LIB_VERSION=2.10.1
            EXPATH_CRYPTO_VERSION=6.0.1
          tags: ${{ matrix.tag }}
          cache-from: type=registry,ref=joewiz/hsg-project:buildcache-${{ matrix.cache_suffix }}
          cache-to: type=registry,ref=joewiz/hsg-project:buildcache-${{ matrix.cache_suffix }},mode=max

      # TEST (amd64 only)
      - name: Start exist-ci containers
        if: matrix.run_tests
        run: |
          docker run -dit -p 8080:8080 --health-interval 4s --name exist-ci --rm ${{ env.TEST_TAG }}

      - name: wait for boot to finish
        if: matrix.run_tests
        timeout-minutes: 5
        run: |
          while ! docker logs exist-ci | grep -q "Server has started"; \
          do sleep 2s; \
          done 

      - name: Run tests
        if: matrix.run_tests
        run: bats --tap test/*.bats

      - name: Check disk space on failure
        if: failure()
        run: |
          echo "=== Disk space after failed build ==="
          df -h / /var/lib/docker /var/lib/containerd 2>/dev/null || df -h
          df -ih /var/lib/docker
          echo "=== Docker system df ==="
          docker system df

  # PUSH (main only, after both platform builds complete)
  push:
    name: Push :latest to Dockerhub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Setup Docker build environment
        uses: ./.github/actions/setup-docker-build

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        id: buildx
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          build-args: |
            TEMPLATING_VERSION=1.1.0
            TEI_PUBLISHER_LIB_VERSION=2.10.1
            EXPATH_CRYPTO_VERSION=6.0.1
          builder: ${{ steps.buildx.outputs.name }}
          push: true
          tags: joewiz/hsg-project:latest
          cache-from: |
            type=registry,ref=joewiz/hsg-project:buildcache-x86
            type=registry,ref=joewiz/hsg-project:buildcache-arm
